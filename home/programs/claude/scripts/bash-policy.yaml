rules:
  - pattern: "*plan-marker-grant.ts*"
    message: |
      /plan-marker-grant skill must NOT be invoked via Bash by the AI.
      The skill is USER-INVOCATION ONLY (frontmatter `disable-model-invocation: true`).
      Running the underlying script via Bash defeats the safety guarantee.
      If the user explicitly asked you to grant a plan marker, ask them to type `/plan-marker-grant` themselves.
  - pattern: "git -C *"
    message: "Do not use 'git -C <path>'. Use 'cd <path> && git <subcmd>' instead (see CLAUDE.md)."
  - pattern: "gh pr create * <<*"
    message: |
      Do not inline heredoc in 'gh pr create --body'. Instead:
      1. Use the Write tool to write the PR body to a temp file with a random suffix:
         File path: /tmp/pr-body-<random>.md  (e.g. 6 alphanumeric chars to avoid conflicts across parallel sessions)
      2. Run: gh pr create --title "..." --body-file /tmp/pr-body-<random>.md
      3. Clean up: rm /tmp/pr-body-<random>.md
  # - pattern: "grep *"
  #   message: "Use rg (ripgrep) instead of grep. Example: rg 'pattern' path/"
  # - pattern: "find *"
  #   message: "Use fd instead of find. Example: fd 'pattern' path/"
