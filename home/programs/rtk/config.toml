# rtk (Rust Token Killer) configuration
# Reference: https://github.com/rtk-ai/rtk#configuration

[hooks]
# Commands to skip auto-rewrite (pass through to shell unchanged).
# rg/grep are excluded: rtk's grep filter truncates match lists and, when its
# subprocess PATH resolves BSD grep instead of ripgrep, ripgrep-only flags
# (--type, --no-heading, globs) fail — feeding the agent output that contradicts
# the command it issued.
exclude_commands = ["rg", "grep"]

[tee]
# Save raw output on failure for debugging.
# rtk's TOML parser has no per-field defaults inside [tee]; all four fields are required.
enabled = true
mode = "failures"
max_files = 20
max_file_size = 1048576
